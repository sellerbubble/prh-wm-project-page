  <text x="600" y="54" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="26" font-weight="750" fill="#17130f">Mutual kNN alignment compares local neighborhoods</text>
  <text x="600" y="84" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="15" font-weight="500" fill="#6f665d">For the same validation states, two predictors are aligned if they choose many of the same nearest neighbors.</text>
