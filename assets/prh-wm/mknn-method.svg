<text x="491.0" y="198" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="14" font-weight="500" fill="#6f665d">H_B from model B</text>
  <rect x="716" y="152" width="174" height="90" rx="8" fill="#fffaf2" stroke="#17130f" stroke-width="1.4"/>
<rect x="716" y="152" width="8" height="90" rx="4" fill="#a6422d"/>
