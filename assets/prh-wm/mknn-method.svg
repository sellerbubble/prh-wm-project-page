<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img">
  
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#284d5c"/>
      </marker>
      <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#24180c" flood-opacity="0.14"/>
      </filter>
      <style>
        .tiny { font-family: IBM Plex Sans, Arial, sans-serif; font-size: 13px; fill: #6f665d; }
        .mono { font-family: SFMono-Regular, Consolas, monospace; font-size: 14px; fill: #17130f; }
      </style>
    </defs>
    
  <rect width="1200" height="560" fill="#f5f0e7"/>
