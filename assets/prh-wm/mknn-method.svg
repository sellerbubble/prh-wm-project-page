<text x="803.0" y="218" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="14" font-weight="500" fill="#6f665d">N_k(x_i^A)</text>
  <rect x="716" y="282" width="174" height="90" rx="8" fill="#fffaf2" stroke="#17130f" stroke-width="1.4"/>
<rect x="716" y="282" width="8" height="90" rx="4" fill="#52684d"/>
<text x="803.0" y="320" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700" fill="#17130f">kNN in B</text>
<text x="803.0" y="348" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="14" font-weight="500" fill="#6f665d">N_k(x_i^B)</text>
  <rect x="966" y="206" width="168" height="112" rx="8" fill="#17130f" stroke="#17130f" stroke-width="1.4"/>
<rect x="966" y="206" width="8" height="112" rx="4" fill="#e79a63"/>
<text x="1050.0" y="244" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700" fill="#17130f">Overlap</text>
<text x="1050.0" y="272" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="14" font-weight="500" fill="#6f665d">|N_A ∩ N_B| / k</text>
  <text x="1050" y="256" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16" font-weight="700" fill="#fffaf2">Average over</text>
  <text x="1050" y="282" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16" font-weight="700" fill="#fffaf2">all paired states</text>
