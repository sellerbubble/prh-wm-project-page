  <path d="M 622 218 L 716 197" fill="none" stroke="#284d5c" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 622 292 L 716 327" fill="none" stroke="#284d5c" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
