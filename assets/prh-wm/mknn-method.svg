  <path d="M 890 327 L 966 280" fill="none" stroke="#284d5c" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="600" y="468" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700" fill="#17130f">m-kNN(A,B) = 1/N Σ_i |N_k(x_i^A) ∩ N_k(x_i^B)| / k</text>
  <text x="600" y="506" text-anchor="middle" font-family="IBM Plex Sans, Arial, sans-serif" font-size="15" font-weight="500" fill="#6f665d">High score: the two hidden spaces preserve similar local topology for matched world states.</text>
